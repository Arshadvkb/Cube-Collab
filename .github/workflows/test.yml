name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Test server
        working-directory: ./server
        run: npm run test

      - name: Install client dependencies
        working-directory: ./client
        run: npm install

      - name: Test client
        working-directory: ./client
        run: npm run test
