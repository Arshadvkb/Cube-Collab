services:
   client:
     build: ./client
     ports:
         - "5173:5173"
     container_name: frontend
     restart: always
     

   server:
     build: ./server
     ports:
       - "5000:5000"
     container_name: backend
     restart: always 

   nginx:
     image: nginx:alpine
     ports:
       - "80:80"
     volumes:
       - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
     depends_on:
       - client
       - server
     container_name: nginx_proxy
     restart: always