services:
   client:
     build: ./client
     env_file:
         - .env
     container_name: frontend
     restart: always
     

   server:
     build: ./server
     env_file:
         - .env
     container_name: backend
     restart: always 


   nginx:
     image: nginx:alpine
     ports:
       - "80:80"
     volumes:
       - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
     depends_on:
       - client
       - server
     container_name: nginx_proxy
     restart: always